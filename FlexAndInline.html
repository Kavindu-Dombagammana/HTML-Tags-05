<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            margin: 0px;
            padding: 0px;
            font-style: sa;
        }
        .one, .two, .three, .four{
            padding: 20px;
            text-align: center;
            font-size: 36px;
            color: white;
        }
        .one{
            background-color: green;
        }
        .two{
            background-color: red;
        }
        .three{
            background-color: blue;
        }
        .four{
            background-color: brown;
        }
        h3{
            text-align: center;
        }
        /* parent stays as a block level element while the child tags turns into inline elements */
        .flexbox{
            /* display: flex; Normal flex makes the parent a block level element and makes the child an inline element*/
            display: flex;
            /* If the width was given it only takes that width which makes int not a block level element */
            background-color: blueviolet;
            border: 2px solid black;
            margin: 10px 0px;
            justify-content: flex-start; /* take the child content to the start of the parent box this is the default behavior of flex*/
            justify-content: flex-end; /* takes the child tags to the ned of the parent box*/
            justify-content: center; /*make the child tags center to the parent box */
            justify-content: space-around; /*make space around te child tags*/
            justify-content: space-between; /*make space only in between the tags*/
            justify-content: space-evenly; /*make space evenly in the parent box*/
            flex-direction: row; /*Default behavior*/
            /* flex-direction: column; This makes the child tags to takes the full width if the width has not defined to the flex box */
            flex-direction: row-reverse;   /*Both Are*/
            /* flex-direction: column-reverse;Same behavior in the reverse direction */
            justify-self: flex-end;
            justify-self: center; 
            justify-self: flex-start;/*all three above are same behavior but in justify-self parent takes the child tags behavior */
            align-items: baseline;/*Align items used to align items inside the flex box*/
            
        }
        .flexbox-1{
            display: inline-flex;
            background-color: blueviolet;
            border: 2px solid black;
            margin: 10px 0px;
            /* Justify content doest work on inline flex since the parent tag itself makes it inline */
        }
    </style>
</head>
<body>

    <h3>Display:Inline-Flex</h3>
